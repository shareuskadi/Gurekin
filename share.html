<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compartir PDF - Gurekin</title>
<style>
body { font-family: sans-serif; background: #f0f4ff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
.card { background: white; border-radius: 16px; padding: 32px 24px; text-align: center; max-width: 360px; width: 100%; box-shadow: 0 8px 32px rgba(37,99,235,0.12); }
.icon { font-size: 48px; margin-bottom: 16px; }
h2 { color: #1d4ed8; margin: 0 0 8px; font-size: 1.3rem; }
p  { color: #64748b; margin: 0 0 24px; font-size: 0.9rem; }
button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin: 6px 0; }
.btn-share    { background: #2563eb; color: white; }
.btn-download { background: #10b981; color: white; }
.btn-back     { background: #f1f5f9; color: #475569; }
.error { color: #ef4444; font-size: 0.85rem; margin-top: 12px; }
#filename { font-weight: 600; color: #0f172a; word-break: break-all; font-size: 0.85rem; background: #f1f5f9; padding: 8px 12px; border-radius: 8px; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="card">
    <div class="icon">📄</div>
    <h2>PDF listo</h2>
    <div id="filename">cargando...</div>
    <button class="btn-share" onclick="compartir()">↗ Compartir por WhatsApp, email...</button>
    <button class="btn-download" onclick="descargar()">⬇ Guardar en el movil</button>
    <button class="btn-back" onclick="window.close()">← Volver a la app</button>
    <div class="error" id="error"></div>
</div>

<script>
var base64data = null;
var filename   = 'reporte.pdf';

function init() {
    try {
        base64data = localStorage.getItem('pendingPDF');
        filename   = localStorage.getItem('pendingPDFname') || 'reporte.pdf';

        if (!base64data) {
            document.getElementById('error').textContent = 'No se encontro el PDF. Vuelve a la app y pulsa Compartir PDF de nuevo.';
            return;
        }

        document.getElementById('filename').textContent = filename;

        // Limpiar despues de leer
        localStorage.removeItem('pendingPDF');
        localStorage.removeItem('pendingPDFname');

    } catch(e) {
        document.getElementById('error').textContent = 'Error al cargar el PDF: ' + e.message;
    }
}

function dataURItoBlob(dataURI) {
    var byteString = atob(dataURI.split(',')[1]);
    var ab = new ArrayBuffer(byteString.length);
    var ia = new Uint8Array(ab);
    for (var i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
    }
    return new Blob([ab], {type: 'application/pdf'});
}

function compartir() {
    if (!base64data) { document.getElementById('error').textContent = 'No hay PDF disponible. Vuelve a la app.'; return; }
    try {
        var blob = dataURItoBlob(base64data);
        var file = new File([blob], filename, {type: 'application/pdf'});

        if (navigator.share && navigator.canShare && navigator.canShare({files:[file]})) {
            navigator.share({
                title: filename,
                files: [file]
            }).catch(function(e) {
                if (e.name !== 'AbortError') descargar();
            });
        } else if (navigator.share) {
            // Compartir sin fichero adjunto no tiene sentido para un PDF
            descargar();
        } else {
            descargar();
        }
    } catch(e) {
        document.getElementById('error').textContent = 'Error: ' + e.message;
        descargar();
    }
}

function descargar() {
    if (!base64data) { document.getElementById('error').textContent = 'No hay PDF disponible. Vuelve a la app.'; return; }
    try {
        var blob    = dataURItoBlob(base64data);
        var blobUrl = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href     = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function() { URL.revokeObjectURL(blobUrl); }, 5000);
    } catch(e) {
        // Ultimo recurso: abrir data URI directamente
        window.open(base64data, '_blank');
    }
}

window.onload = init;
</script>
</body>
</html>
